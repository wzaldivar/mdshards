# SonarCloud (SonarQube Cloud) configuration.
#
# projectKey / organization are account-specific. The defaults below follow
# SonarCloud's GitHub-import convention (org = your login, key = <org>_<repo>);
# confirm them against your SonarCloud dashboard and edit if they differ.
sonar.projectKey=wzaldivar_mdshards
sonar.organization=wzaldivar

# Sources vs tests, across the two subprojects.
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src/__tests__
sonar.test.inclusions=backend/tests/**,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx

# Coverage reports produced by CI (see .github/workflows/ci.yml).
sonar.python.version=3.14
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Never analyze build output, deps, or the docs assets.
sonar.exclusions=frontend/dist/**,**/node_modules/**,backend/static/**,docs/**
