# mdshards — deployment mode 3, "routing trick" variant: the bundle is built
# UNBAKED (no VITE_BACKEND_HOST, all URLs origin-rooted) and nginx supplies
# the routing to a hidden uvicorn. See README "Deployment" mode 3.
#
# Routing contract (mirrors backend/app/routers/pages.py and the Vite dev
# middleware in frontend/vite.config.ts):
#
#   /api/*, /ws/*        → backend (REST + CRDT WebSocket)
#   /assets/*, favicon   → the Vite bundle's own files, served by nginx
#   top-level document   → nginx's dist/index.html (the SPA shell). It MUST be
#   navigation             served here: a two-container backend has no static/
#                          dir, so its fallback shell has no script tags.
#   everything else      → backend. This is the piece naive SPA configs miss:
#                          vault asset bytes live at arbitrary URLs
#                          (/img1.jpg, /notes/diagram.png) and only the
#                          backend knows the md-wins resolution rule.
#
# The `Host` header MUST be forwarded unchanged: the backend's OriginGuard
# authorizes browser requests by matching `Origin` against `Host` (there is
# no configured canonical origin). nginx does NOT do this by default — its
# default is `Host $proxy_host` — hence the explicit proxy_set_header lines.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        # The server pushes a keepalive frame after 10s of silence (see
        # backend/app/ws.py), so a modest read timeout only has to outlive
        # that, not the whole editing session.
        proxy_read_timeout 300s;
    }

    # Vite's hashed bundle files — immutable by construction.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location = /favicon.svg { try_files $uri =404; }
    location = /icons.svg   { try_files $uri =404; }

    # Everything else: browsers navigating to a page (Sec-Fetch-Dest:
    # document) get the SPA shell; sub-resource fetches (img, iframe, fetch)
    # fall through to the backend, which serves vault asset bytes or 404s.
    # The 418/error_page pair is the stock trick for jumping to a named
    # location from inside an `if`.
    location / {
        error_page 418 = @backend;
        if ($http_sec_fetch_dest != "document") {
            return 418;
        }
        rewrite ^ /index.html break;
    }

    location @backend {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
    }
}
