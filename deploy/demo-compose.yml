# Public demo of mdshards. Builds the demo image (read-only landing page,
# uploads disabled, attachments/ locked, external links/images neutralized) and
# runs it with a hard disk cap. This file IS the whole lifecycle:
#
#   docker compose -f deploy/demo-compose.yml up -d --build
#   docker compose -f deploy/demo-compose.yml down
#
# The vault + cache live on a size-capped tmpfs mounted at /data — a full vault
# gets ENOSPC instead of eating host disk. tmpfs is set up by the Docker daemon
# (no privileged container needed) and is per-container, so `down && up`
# recreates it → a fresh empty cap. The scheduled "wipe every 2h" is just a
# `down && up` on a timer. Nothing on the host to manage; no external volume.
services:
  demo:
    build:
      context: ..
      dockerfile: Dockerfile
    image: mdshards:demo
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Hard 20 MiB cap on the whole /data filesystem (vault + CRDT cache),
    # RAM-backed and ephemeral. No volume, no privileged — the daemon mounts it.
    tmpfs:
      - /data:size=20m
