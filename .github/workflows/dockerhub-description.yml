name: Docker Hub description

# Sync ONLY the Docker Hub repository page (short description + overview
# markdown) — no image build/push. Two entry points:
#
#   * Manual (workflow_dispatch): run it to fix/refresh the page out of band,
#     without cutting a release —
#       Actions → Docker Hub description → Run workflow (any branch)
#       or:  gh workflow run dockerhub-description.yml --ref <branch>
#   * Reused by release.yml (workflow_call): synced on every publish.
#
# This is the single source of the short-description string and the
# readme-filepath — release.yml calls in here rather than carrying its own copy
# (.github/scripts/validate_dockerhub_description.py enforces there's no
# divergent copy elsewhere).
#
# `fail_on_error` controls whether a sync failure fails the run. Manual runs
# default to true (fail-loud — surface a bad credential instead of green-washing
# it); release.yml passes false so a description hiccup never fails a publish
# that already pushed the image. Docker Hub's description API wants the account
# PASSWORD, not a PAT — set DOCKERHUB_DESCRIPTION_TOKEN to it if DOCKERHUB_TOKEN
# 401s (see docs/ci-setup.md).

on:
  workflow_dispatch:
    inputs:
      fail_on_error:
        description: "Fail the run if the description sync fails."
        type: boolean
        default: true
  workflow_call:
    inputs:
      fail_on_error:
        description: "Fail the job if the sync fails. release.yml passes false to stay non-fatal."
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Docker Hub description
        continue-on-error: ${{ !inputs.fail_on_error }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DESCRIPTION_TOKEN || secrets.DOCKERHUB_TOKEN }}
          repository: wzaldivar/mdshards
          short-description: "Browser editor for a plain-markdown note vault on your LAN. FastAPI + CRDT sync, no database."
          readme-filepath: ./docs/dockerhub-overview.md
