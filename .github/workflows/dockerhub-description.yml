name: Docker Hub description

# Sync ONLY the Docker Hub repository page (short description + overview
# markdown) — no image build/push. Run it manually to fix or refresh the page
# without cutting a release:
#
#   Actions → Docker Hub description → Run workflow (pick any branch)
#   or:  gh workflow run dockerhub-description.yml --ref <branch>
#
# release.yml keeps its own sync step for publish time; this workflow is the
# out-of-band path. The two short-description strings are kept identical by
# .github/scripts/validate_dockerhub_description.py (a CI check), so this copy
# can't silently drift from the release one.
#
# Unlike release.yml's step, this run is FAIL-LOUD (no continue-on-error): a
# manual sync should surface a bad credential rather than green-wash it. Docker
# Hub's description API wants the account PASSWORD, not a PAT — set the
# DOCKERHUB_DESCRIPTION_TOKEN secret to it if DOCKERHUB_TOKEN 401s (see
# docs/ci-setup.md).

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DESCRIPTION_TOKEN || secrets.DOCKERHUB_TOKEN }}
          repository: wzaldivar/mdshards
          short-description: "Browser editor for a plain-markdown note vault on your LAN. FastAPI + CRDT sync, no database."
          readme-filepath: ./docs/dockerhub-overview.md
