name: CI

on:
  push:
    branches: [main, fix/sonar-s5146-open-redirect]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Test with coverage
        run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  sonarcloud:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Sonar wants full history for accurate new-code / blame attribution.
          fetch-depth: 0
      # Self-guard: the scan only runs once SONAR_TOKEN is set (see
      # docs/ci-setup.md). Until then this job is a green no-op instead of a
      # red failure, so wiring Sonar is a one-secret step done whenever.
      - name: Detect SONAR_TOKEN
        id: guard
        env:
          TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"
          else echo "enabled=false" >> "$GITHUB_OUTPUT"; echo "::notice::SONAR_TOKEN not set — skipping SonarCloud scan"; fi
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - if: steps.guard.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
