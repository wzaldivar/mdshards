name: CI

on:
  # Analyze main (the SonarCloud baseline) on every push, and every PR into
  # it. PR runs get SonarCloud pull-request analysis — issues are diffed
  # against main, so a fix actually shows up as resolved (branch analysis of a
  # scratch branch attributes pre-existing issues to main and hides that).
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Test with coverage
        run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Real-browser end-to-end: docker compose builds the shipping image, runs it
  # as app services, and runs the pytest suite inside the official Playwright
  # image, driving Chromium + Firefox + WebKit against the apps by service name
  # (edit → disk flush, in-note images, switcher journeys, sub-path
  # containment, split-mount permissions). Fully containerized — no browser on
  # the runner. ubuntu-latest ships Docker + compose.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the shipping image
        run: docker compose -f e2e/docker-compose.e2e.yml build
      - name: Browser tests (Chromium + Firefox + WebKit)
        run: docker compose -f e2e/docker-compose.e2e.yml run --rm tests
      - name: Tear down
        if: always()
        run: docker compose -f e2e/docker-compose.e2e.yml down -v

  # Validate the Docker Hub page artifacts (short-description + overview md)
  # that release.yml syncs, so an over-limit / stale / relative-link value is
  # caught here instead of silently producing a wrong Docker Hub page on the
  # next release. Stdlib-only script; no setup beyond the default Python.
  dockerhub-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Hub description
        run: python3 .github/scripts/validate_dockerhub_description.py

  sonarcloud:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Sonar wants full history for accurate new-code / blame attribution.
          fetch-depth: 0
      # Self-guard: the scan only runs once SONAR_TOKEN is set (see
      # docs/ci-setup.md). Until then this job is a green no-op instead of a
      # red failure, so wiring Sonar is a one-secret step done whenever.
      - name: Detect SONAR_TOKEN
        id: guard
        env:
          TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"
          else echo "enabled=false" >> "$GITHUB_OUTPUT"; echo "::notice::SONAR_TOKEN not set — skipping SonarCloud scan"; fi
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - if: steps.guard.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
