name: Release

# Publishes the single-container image (the repo-root Dockerfile) to Docker Hub
# as wzaldivar/mdshards:<version> and :latest. Triggers on a v* tag, or run
# manually with an explicit version. Multi-arch: linux/amd64 + linux/arm64.
#
# Requires two repo secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  — Docker Hub account (wzaldivar)
#   DOCKERHUB_TOKEN     — a Docker Hub access token (not the password)
# Until they exist the job is a green no-op, so tagging a release before
# wiring credentials never fails CI. See docs/ci-setup.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. 1.0.0"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + credential state
        id: meta
        env:
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"   # strip leading v from the tag
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$TOKEN" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"
          else echo "enabled=false" >> "$GITHUB_OUTPUT"; echo "::notice::DOCKERHUB_TOKEN not set — skipping Docker Hub publish of $VERSION"; fi

      - if: steps.meta.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@v3
      - if: steps.meta.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3
      - if: steps.meta.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - if: steps.meta.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            wzaldivar/mdshards:${{ steps.meta.outputs.version }}
            wzaldivar/mdshards:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/wzaldivar/mdshards
            org.opencontainers.image.licenses=MIT

      # Sync the Docker Hub page from docs/dockerhub-overview.md so it never
      # drifts. Non-fatal: Docker Hub's description endpoint historically
      # wants the account PASSWORD rather than a PAT, so if the token 401s
      # here the image publish above still succeeds — see docs/ci-setup.md.
      - if: steps.meta.outputs.enabled == 'true'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DESCRIPTION_TOKEN || secrets.DOCKERHUB_TOKEN }}
          repository: wzaldivar/mdshards
          short-description: "Browser editor for a plain-markdown note vault on your LAN. FastAPI + CRDT sync, no database."
          readme-filepath: ./docs/dockerhub-overview.md
