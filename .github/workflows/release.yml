name: Release

# Publishes the single-container image (the repo-root Dockerfile) to Docker Hub
# as wzaldivar/mdshards:<version> and :latest. Triggers on a v* tag, or run
# manually with an explicit version. Multi-arch: linux/amd64 + linux/arm64.
#
# Requires two repo secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  — Docker Hub account (wzaldivar)
#   DOCKERHUB_TOKEN     — a Docker Hub access token (not the password)
# Until they exist the job is a green no-op, so tagging a release before
# wiring credentials never fails CI. See docs/ci-setup.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. 1.0.0"
        required: true
      allow_overwrite:
        description: "Overwrite the version tag if it already exists on Docker Hub"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.meta.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + credential state
        id: meta
        env:
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"   # strip leading v from the tag
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$TOKEN" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"
          else echo "enabled=false" >> "$GITHUB_OUTPUT"; echo "::notice::DOCKERHUB_TOKEN not set — skipping Docker Hub publish of $VERSION"; fi

      # Immutability guard: refuse to overwrite a version already on Docker Hub.
      # `:latest` and deliberate re-runs (Run workflow with allow_overwrite=true)
      # are the only intended overwrites. Fail-OPEN if Hub's API is unreachable
      # — this is a convenience rail, not a security control, so a metadata
      # blip shouldn't block a release.
      - name: Refuse to overwrite an existing version
        if: steps.meta.outputs.enabled == 'true' && !inputs.allow_overwrite
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://hub.docker.com/v2/repositories/wzaldivar/mdshards/tags/${VERSION}" || echo 000)
          if [ "$code" = "200" ]; then
            echo "::error::wzaldivar/mdshards:${VERSION} already exists on Docker Hub. Published versions are immutable — bump to a new version instead. To overwrite on purpose, re-run via Actions → Release → Run workflow with allow_overwrite = true."
            exit 1
          fi
          echo "Version ${VERSION} is not on Docker Hub yet (HTTP ${code}) — proceeding."

      - if: steps.meta.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@v3
      - if: steps.meta.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3
      - if: steps.meta.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - if: steps.meta.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            wzaldivar/mdshards:${{ steps.meta.outputs.version }}
            wzaldivar/mdshards:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/wzaldivar/mdshards
            org.opencontainers.image.licenses=MIT

  # Sync the Docker Hub page after a successful publish. Delegated to the
  # reusable dockerhub-description workflow (single source of the description
  # inputs) with fail_on_error=false, so a description hiccup — e.g. Docker
  # Hub's endpoint wanting the account PASSWORD over a PAT — never fails a
  # publish that already pushed the image. See docs/ci-setup.md.
  description:
    needs: publish
    if: needs.publish.outputs.enabled == 'true'
    uses: ./.github/workflows/dockerhub-description.yml
    with:
      fail_on_error: false
    secrets: inherit
