[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["app"]
# `app/main.py` wires the ASGI app + lifespan; exercised via TestClient but
# uvicorn's own entry isn't unit-tested. Kept in scope — it still reports.

[tool.coverage.report]
show_missing = true
